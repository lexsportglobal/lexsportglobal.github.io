name: Keep Supabase Alive
on:
  schedule:
    # S'exécute tous les jours à minuit (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permet de le tester manuellement depuis l'onglet Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "https://kjhrikutzxixmvmhbjqk.supabase.co/rest/v1/" \
          --H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
